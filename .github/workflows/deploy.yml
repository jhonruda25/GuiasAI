name: Deploy to Dokploy via Docker Hub

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/guiasai-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/guiasai-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get short SHA
        id: slug
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.slug.outputs.sha_short }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.slug.outputs.sha_short }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

  deploy-to-dokploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Get short SHA
        id: slug
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update IMAGE_TAG in Dokploy
        shell: python
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          IMAGE_TAG: ${{ steps.slug.outputs.sha_short }}
        run: |
          import os, requests
          url = os.environ['DOKPLOY_URL']
          token = os.environ['DOKPLOY_API_TOKEN']
          cid = os.environ['DOKPLOY_COMPOSE_ID']
          tag = os.environ['IMAGE_TAG']
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          
          # 1. Obtener la configuración actual (para no borrar variables)
          try:
              resp = requests.post(f"{url}/api/compose.one", json={"composeId": cid}, headers=headers)
              resp.raise_for_status()
              data = resp.json()
          except Exception as e:
              print(f"Error fetching compose config: {e}")
              exit(1)

          current_env = data.get('env', '') or ''
          
          # 2. Mezclar IMAGE_TAG (reemplazar si existe, añadir si no)
          lines = current_env.split('\n')
          new_lines = [l for l in lines if not l.split('=')[0].strip() == 'IMAGE_TAG' and l.strip()]
          new_lines.append(f"IMAGE_TAG={tag}")
          new_env = '\n'.join(new_lines)
          
          # 3. Actualizar enviando el objeto completo + el nuevo env
          payload = {**data, "env": new_env}
          try:
              update_resp = requests.post(f"{url}/api/compose.update", json=payload, headers=headers)
              update_resp.raise_for_status()
              print(f"✅ Successfully updated IMAGE_TAG to {tag}")
          except Exception as e:
              print(f"Error updating compose: {e}")
              exit(1)

      - name: Trigger Dokploy Deploy
        run: |
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
