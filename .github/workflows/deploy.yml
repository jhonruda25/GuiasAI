name: Deploy to Dokploy via Docker Hub

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/guiasai-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/guiasai-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get short SHA
        id: slug
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.slug.outputs.sha_short }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.slug.outputs.sha_short }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

  deploy-to-dokploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Get short SHA
        id: slug
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update IMAGE_TAG in Dokploy
        shell: python
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          IMAGE_TAG: ${{ steps.slug.outputs.sha_short }}
        run: |
          import os, requests, json, urllib.parse
          url = os.environ['DOKPLOY_URL']
          token = os.environ['DOKPLOY_API_TOKEN']
          cid = os.environ['DOKPLOY_COMPOSE_ID']
          tag = os.environ['IMAGE_TAG']
          headers = {"x-api-key": token, "Content-Type": "application/json"}
          
          # 1. Obtener la configuración actual (Query GET tRPC)
          input_obj = {"0": {"json": {"composeId": cid}}}
          input_str = urllib.parse.quote(json.dumps(input_obj))
          get_url = f"{url}/api/trpc/compose.one?batch=1&input={input_str}"
          
          try:
              resp = requests.get(get_url, headers=headers)
              resp.raise_for_status()
              # Extraer los datos del formato batch de tRPC
              data = resp.json()[0]['result']['data']['json']
          except Exception as e:
              print(f"Error fetching compose config: {e}")
              exit(1)

          current_env = data.get('env', '') or ''
          
          # 2. Mezclar IMAGE_TAG
          lines = current_env.split('\n')
          new_lines = [l for l in lines if not l.split('=')[0].strip() == 'IMAGE_TAG' and l.strip()]
          new_lines.append(f"IMAGE_TAG={tag}")
          new_env = '\n'.join(new_lines)
          
          # 3. Actualizar (Mutation POST tRPC)
          # El body de tRPC Mutation también lleva el formato { "0": { "json": { ... } } }
          update_url = f"{url}/api/trpc/compose.update?batch=1"
          payload = {
              "0": {
                  "json": {
                      **data,
                      "env": new_env
                  }
              }
          }
          
          try:
              update_resp = requests.post(update_url, json=payload, headers=headers)
              update_resp.raise_for_status()
              print(f"✅ Successfully updated IMAGE_TAG to {tag} via tRPC")
          except Exception as e:
              print(f"Error updating compose: {e}")
              if hasattr(e, 'response') and e.response is not None:
                  print(f"Details: {e.response.text}")
              exit(1)

      - name: Trigger Dokploy Deploy
        run: |
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
