services:
  postgres:
    image: postgres:16-alpine
    container_name: guiasai-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-guiasai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-guiasai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: guiasai-redis-local
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_local:/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: guiasai-backend-local
    restart: unless-stopped
    # Intentamos leer tu archivo .env local si existe
    env_file: 
      - ./apps/backend/.env
    environment:
      # Sobreescribimos las base de datos para que apunten a los contenedores locales exactos de este YAML
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-guiasai}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: guiasai-frontend-local
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Simulamos que le hablamos al backend localmente
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data_local:
  redis_data_local:
