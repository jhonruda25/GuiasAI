services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: guiasai-backend-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3001}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
      - AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_ROOT_MODEL=${GEMINI_ROOT_MODEL}
    networks:
      - dokploy-network
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: guiasai-frontend-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    container_name: guiasai-redis-prod
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - dokploy-network

volumes:
  redis_data:

networks:
  dokploy-network:
    external: true
