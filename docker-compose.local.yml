x-backend-env: &backend-env
  NODE_ENV: development
  PORT: 3001
  FRONTEND_URL: http://localhost:3000
  DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-guiasai}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-guiasai_session}
  SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
  SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
  AUTH_BCRYPT_ROUNDS: ${AUTH_BCRYPT_ROUNDS:-12}
  SEED_DEMO_USER: ${SEED_DEMO_USER:-false}
  GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
  GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
  GEMINI_FALLBACK_MODEL: ${GEMINI_FALLBACK_MODEL:-gemini-2.5-flash}
  GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-3.1-flash-image-preview}
  GEMINI_IMAGE_FALLBACK_MODEL: ${GEMINI_IMAGE_FALLBACK_MODEL:-gemini-2.5-flash-image-preview}
  SENTRY_DSN: ${SENTRY_DSN:-}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-guiasai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-guiasai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_local:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    environment: *backend-env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/readyz').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    env_file:
      - ./apps/backend/.env
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data_local:
  redis_data_local:
